services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: local-rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-rag-api
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    environment:
      # Shared deployment points at the remote Qdrant service.
      QDRANT_URL: http://qdrant:6333
      # Enforce allowed services/collections in the retrieval core.
      SCOPE_POLICY_MODE: namespace
      # API keys -> scope grants, and optional seed profiles.
      API_KEYS_FILE: /config/api_keys.json
      PROFILES_FILE: /config/profiles.json
      METRICS_ENABLED: "true"
      GENERATION_BASE_URL: http://host.docker.internal:8080/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app.db:/app/app.db
      - ./config:/config:ro
    restart: unless-stopped

  rag-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-rag-mcp
    depends_on:
      - qdrant
    command: ["python", "-m", "app.mcp", "--transport", "streamable-http"]
    ports:
      - "8001:8001"
    environment:
      QDRANT_URL: http://qdrant:6333
      SCOPE_POLICY_MODE: namespace
      API_KEYS_FILE: /config/api_keys.json
      PROFILES_FILE: /config/profiles.json
      # The MCP process authenticates with this key; every tool call is scoped
      # to its grant. Each consuming agent runs its own MCP connection/key.
      LOCAL_RAG_API_KEY: ${LOCAL_RAG_API_KEY:-}
      FASTMCP_PORT: "8001"
      FASTMCP_HOST: 0.0.0.0
      GENERATION_BASE_URL: http://host.docker.internal:8080/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app.db:/app/app.db
      - ./config:/config:ro
    restart: unless-stopped

volumes:
  qdrant_storage:
